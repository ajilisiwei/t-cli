name: AI Release Notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to generate release notes for (optional, uses HEAD)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-notes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: Generate Release Notes
        id: ai
        env:
          # === Model config — switch via GitHub Variables ===
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: changelog
          PREV_TAG: ${{ github.event.inputs.tag || '' }}
        run: python .github/scripts/ai_agent.py > RELEASE_NOTES.md

      - name: Check output
        id: check
        run: |
          if [ ! -s RELEASE_NOTES.md ] || grep -q "No new commits" RELEASE_NOTES.md; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "=== Generated Release Notes ==="
            cat RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
