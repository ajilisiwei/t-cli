name: AI Release Notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to generate release notes for (optional, uses HEAD)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-notes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        uses: ajilisiwei/ai-cicd-action@v1
        with:
          action: changelog
          llm-provider: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          llm-model: ${{ vars.LLM_MODEL || 'deepseek-chat' }}
          llm-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          prev-tag: ${{ github.event.inputs.tag || '' }}

      - name: Check output
        id: check
        run: |
          if [ ! -s RELEASE_NOTES.md ] || grep -q "No new commits" RELEASE_NOTES.md; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "=== Generated Release Notes ==="
            cat RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
