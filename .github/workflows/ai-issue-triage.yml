# AI Issue Triage — weekly scan + classify open issues
# Runs every Monday at 7:00 UTC, on new issues, and on manual dispatch.
# AI reads each untriaged issue → assigns type + priority labels.

name: AI Issue Triage

on:
  schedule:
    - cron: "0 7 * * 1"   # Monday 7:00 UTC
  issues:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: issue-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: AI Issue Triage
        id: ai
        uses: ajilisiwei/ai-cicd-action@v1
        with:
          action: issue_triage
          llm-provider: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          llm-model: ${{ vars.LLM_MODEL || 'deepseek-chat' }}
          llm-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          github-token: ${{ github.token }}

      - name: Print report
        env:
          REPORT: ${{ steps.ai.outputs.report }}
        run: |
          echo "=== Triage Report ==="
          echo "$REPORT"
