# AI Issue Triage — weekly scan + classify open issues
# Runs every Monday at 7:00 UTC, on new issues, and on manual dispatch.
# AI reads each untriaged issue → assigns type + priority labels.

name: AI Issue Triage

on:
  schedule:
    - cron: "0 7 * * 1"   # Monday 7:00 UTC
  issues:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: issue-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: AI Issue Triage
        id: ai
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: issue_triage
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/ai_agent.py

      - name: Print report
        env:
          REPORT: ${{ steps.ai.outputs.report }}
        run: |
          echo "=== Triage Report ==="
          echo "$REPORT"
