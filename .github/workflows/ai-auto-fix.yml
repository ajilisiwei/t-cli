# AI Auto-Fix: automatically fixes failing CI tests
# Triggered when the CI workflow completes with failure.
# AI reads the logs, generates a fix, commits and pushes.
#
# Safety: only fixes source code (src/), never modifies tests (test/).
# If AI is unsure, it outputs UNSURE: and exits without pushing.

name: AI Auto-Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: auto-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  auto-fix:
    # Only run when CI fails, and not on main branch (avoid infinite loops)
    if: >
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.head_branch != 'main'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout failed branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: Setup GitHub CLI auth
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "$GH_TOKEN" | gh auth login --with-token

      - name: AI Auto-Fix
        id: ai
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: auto_fix
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          FIX_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: python .github/scripts/ai_agent.py
