# AI Auto-Fix: automatically fixes failing CI tests
# Triggered when the CI workflow completes with failure.
# AI reads the logs, generates a fix, verifies (npm test), commits and pushes.
#
# Safety: only fixes source code (src/), never modifies tests (test/).
# If AI is unsure, it outputs UNSURE: and exits without pushing.
#
# The push uses the checkout credentials (GH_PAT) so it re-triggers CI (a
# github.token push does not, by GitHub's anti-recursion rule) — closing the
# fix -> push -> re-verify loop. Falls back to github.token when no PAT is set.

name: AI Auto-Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: auto-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  auto-fix:
    # Only run when CI fails, and not on main branch (avoid infinite loops)
    if: >
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.head_branch != 'main'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout failed branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: AI Auto-Fix
        id: ai
        uses: ajilisiwei/ai-cicd-action@v1
        with:
          action: auto_fix
          llm-provider: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          llm-model: ${{ vars.LLM_MODEL || 'deepseek-chat' }}
          llm-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          failed-run-id: ${{ github.event.workflow_run.id }}
          fix-branch: ${{ github.event.workflow_run.head_branch }}
          # gh (in the engine) reads this to fetch CI logs. The git push reuses the
          # checkout credentials above (GH_PAT), which is what re-triggers CI.
          github-token: ${{ github.token }}
