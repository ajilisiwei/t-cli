# AI Test Suggestion — suggests unit tests for PR changes
# Runs on every PR to main. Posts test suggestions as a PR comment.

name: AI Test Suggestion

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize]

permissions:
  pull-requests: write

concurrency:
  group: test-suggestion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  suggest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: AI Test Suggestion
        id: ai
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: test_suggestion
        run: python .github/scripts/ai_agent.py

      - name: Post Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              body = fs.readFileSync('suggestion.txt', 'utf8').trim();
            } catch (e) {
              console.log('No suggestion file found');
            }
            if (!body || body.includes('No code changes')) {
              console.log('No suggestion to post');
              return;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 🧪 AI Test Suggestions\n\n${body}`
            });
