# AI Test Suggestion — suggests unit tests for PR changes
# Runs on every PR to main/dev. Posts test suggestions as a PR comment.

name: AI Test Suggestion

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize]

permissions:
  pull-requests: write

concurrency:
  group: test-suggestion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  suggest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: AI Test Suggestion
        id: ai
        uses: ajilisiwei/ai-cicd-action@v1
        with:
          action: test_suggestion
          llm-provider: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          llm-model: ${{ vars.LLM_MODEL || 'deepseek-chat' }}
          llm-api-key: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Post Comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              body = fs.readFileSync('suggestion.txt', 'utf8').trim();
            } catch (e) {
              console.log('No suggestion file found');
            }
            if (!body || body.includes('No code changes')) {
              console.log('No suggestion to post');
              return;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 🧪 AI Test Suggestions\n\n${body}`
            });
