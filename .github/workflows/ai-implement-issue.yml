name: AI Issue Implementer

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-implement-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: >
      contains(github.event.comment.body, '@coder')
      && !github.event.issue.pull_request

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: AI Implement — plan + generate code + push branch
        id: ai
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: implement_issue
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/ai_agent.py

      - name: Create Pull Request
        if: steps.ai.outputs.branch != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          branch: ${{ steps.ai.outputs.branch }}
          title: ${{ steps.ai.outputs.pr_title }}
          body-path: ${{ steps.ai.outputs.pr_body_path }}
          delete-branch: true

      - name: Post result on issue
        if: steps.ai.outputs.branch != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL="https://github.com/${{ github.repository }}/pull/${{ steps.create-pr.outputs.pull-request-number }}"
          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 @coder has implemented this issue!

          PR: ${PR_URL}
          Branch: \`${{ steps.ai.outputs.branch }}\`

          Please review the PR before merging."
