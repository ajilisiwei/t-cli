name: AI Issue Implementer

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-implement-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    # Only trusted users may trigger AI implementation:
    # any commenter could otherwise burn API budget and inject prompts via the issue body.
    if: >
      contains(github.event.comment.body, '@coder')
      && !github.event.issue.pull_request
      && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: AI Implement — plan + generate code + commit
        id: ai
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: implement_issue
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: python .github/scripts/ai_agent.py

      - name: Push branch
        if: steps.ai.outputs.branch != ''
        env:
          BRANCH: ${{ steps.ai.outputs.branch }}
        run: git push origin --force "HEAD:${BRANCH}"

      - name: Create or update PR
        if: steps.ai.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BRANCH: ${{ steps.ai.outputs.branch }}
          PR_TITLE: ${{ steps.ai.outputs.pr_title }}
          PR_BODY_PATH: ${{ steps.ai.outputs.pr_body_path }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          VERIFIED: ${{ steps.ai.outputs.verified }}
        run: |
          # gh passes --title/--body-file as argv, so untrusted values can't inject shell/JSON.
          # The issue branch (ai/issue-N) is stable, so a re-run must UPDATE the existing PR
          # rather than fail on "a pull request already exists".
          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "$PR_TITLE" --body-file "$PR_BODY_PATH"
            PR_URL=$(gh pr view "$existing" --json url --jq .url)
            echo "Updated existing PR: ${PR_URL}"
          else
            PR_URL=$(gh pr create --base main --head "$BRANCH" \
              --title "$PR_TITLE" --body-file "$PR_BODY_PATH" --draft)
            echo "Created PR: ${PR_URL}"
          fi

          if [ "$VERIFIED" = "true" ]; then
            STATUS="✅ automated verification passed — ready for review"
          else
            STATUS="⚠️ automated verification FAILED — do NOT merge as-is (see PR body)"
          fi
          gh issue comment "$ISSUE_NUMBER" --body "$(printf '%s\n' \
            "🤖 @coder implemented this issue." \
            "" \
            "PR: ${PR_URL}" \
            "Status: ${STATUS}" \
            "Branch: \`${BRANCH}\`" \
            "" \
            "Review the Draft PR before merging.")"
