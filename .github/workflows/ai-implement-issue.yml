name: AI Issue Implementer

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-implement-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: >
      contains(github.event.comment.body, '@coder')
      && !github.event.issue.pull_request

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: AI Implement — plan + generate code + commit
        id: ai
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: implement_issue
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: python .github/scripts/ai_agent.py

      - name: Push branch and create PR
        if: steps.ai.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          BRANCH="${{ steps.ai.outputs.branch }}"
          git push origin "HEAD:${BRANCH}" 2>&1

          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "${{ steps.ai.outputs.pr_title }}" \
            --body-file "${{ steps.ai.outputs.pr_body_path }}" \
            2>&1)

          echo "PR: ${PR_URL}"
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 @coder has implemented this issue!

          PR: ${PR_URL}
          Branch: \`${BRANCH}\`

          Please review the PR before merging." 2>&1
