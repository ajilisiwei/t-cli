name: AI Issue Implementer

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-implement-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: >
      contains(github.event.comment.body, '@coder')
      && !github.event.issue.pull_request

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: AI Implement — plan + generate code + commit
        id: ai
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: implement_issue
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: python .github/scripts/ai_agent.py

      - name: Push branch
        if: steps.ai.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -x
          BRANCH="${{ steps.ai.outputs.branch }}"
          echo "Remote URL before:"
          git remote -v
          git remote set-url origin "https://oauth2:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${BRANCH}" 2>&1
          echo "Exit code: $?"

