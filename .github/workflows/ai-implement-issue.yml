name: AI Issue Implementer

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-implement-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: >
      contains(github.event.comment.body, '@coder')
      && !github.event.issue.pull_request

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: AI Implement — plan + generate code + commit
        id: ai
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: implement_issue
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: python .github/scripts/ai_agent.py

      - name: Push branch and create PR
        if: steps.ai.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          BRANCH="${{ steps.ai.outputs.branch }}"
          git push origin "HEAD:${BRANCH}" 2>&1

          if [ -n "${{ secrets.GH_PAT }}" ]; then
            PR_JSON=$(curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls" \
              -d "$(cat <<EOJD
          {
            "title": "${{ steps.ai.outputs.pr_title }}",
            "head": "${BRANCH}",
            "base": "main",
            "body": $(cat ${{ steps.ai.outputs.pr_body_path }} | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))"),
            "draft": true
          }
          EOJD
          )" 2>&1)

            PR_URL=$(echo "$PR_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('html_url','ERROR: '+str(d)))" 2>&1)
            echo "PR: ${PR_URL}"
            echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

            gh issue comment ${{ github.event.issue.number }} \
              --body "🤖 @coder has implemented this issue!

          PR: ${PR_URL}
          Branch: \`${BRANCH}\`

          Please review the Draft PR before merging." 2>&1
          else
            echo "::warning::Cannot create PR automatically."
            echo "::warning::Add a GH_PAT secret (Settings → Secrets → Actions) to enable auto-PR."
            echo "::warning::For now, manually create a PR from branch '${BRANCH}' to main."

            gh issue comment ${{ github.event.issue.number }} \
              --body "🤖 @coder has implemented this issue!

          Branch: \`${BRANCH}\`

          To create a PR, go to:
          https://github.com/${{ github.repository }}/compare/main...${BRANCH}?expand=1

          *To enable automatic PR creation, add a \`GH_PAT\` secret to this repository.*" 2>&1
          fi
