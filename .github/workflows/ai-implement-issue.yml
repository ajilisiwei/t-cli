name: AI Issue Implementer

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-implement-${{ github.event.issue.number }}
  # Do NOT cancel in progress: every issue comment (incl. the bot's own completion
  # comment, which is skipped by the job `if`) enters this group; cancelling would
  # let a to-be-skipped run kill a legitimate in-progress implementation.
  cancel-in-progress: false

jobs:
  implement:
    # Only trusted users may trigger AI implementation:
    # any commenter could otherwise burn API budget and inject prompts via the issue body.
    # The final "🤖 ..." status comment is posted with the same PAT (an OWNER) and must NOT
    # re-trigger this workflow, so bot comments (prefixed 🤖) are excluded.
    if: >
      contains(github.event.comment.body, '@coder')
      && !github.event.issue.pull_request
      && !startsWith(github.event.comment.body, '🤖')
      && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: AI Implement — plan + generate code + commit
        id: ai
        uses: ajilisiwei/ai-cicd-action@v1
        with:
          action: implement_issue
          llm-provider: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          llm-model: ${{ vars.LLM_MODEL || 'deepseek-chat' }}
          llm-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          issue-number: ${{ github.event.issue.number }}
          github-token: ${{ secrets.GH_PAT || github.token }}

      - name: Push branch
        if: steps.ai.outputs.branch != ''
        env:
          BRANCH: ${{ steps.ai.outputs.branch }}
        run: git push origin --force "HEAD:${BRANCH}"

      - name: Create or update PR
        if: steps.ai.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BRANCH: ${{ steps.ai.outputs.branch }}
          PR_TITLE: ${{ steps.ai.outputs.pr_title }}
          PR_BODY_PATH: ${{ steps.ai.outputs.pr_body_path }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          VERIFIED: ${{ steps.ai.outputs.verified }}
        run: |
          # gh passes --title/--body-file as argv, so untrusted values can't inject shell/JSON.
          # The issue branch (ai/issue-N) is stable, so a re-run must UPDATE the existing PR
          # rather than fail on "already exists". `gh pr list/edit` use a GraphQL query that
          # needs read:org scope, which GH_PAT (repo scope) lacks — so use the REST API.
          OWNER="${GITHUB_REPOSITORY%/*}"
          set +e
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "$PR_TITLE" --body-file "$PR_BODY_PATH" --draft 2>create_err.txt)
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "Created PR: ${PR_URL}"
          else
            cat create_err.txt
            NUM=$(gh api "repos/${GITHUB_REPOSITORY}/pulls?head=${OWNER}:${BRANCH}&state=open" --jq '.[0].number')
            if [ -z "$NUM" ]; then
              echo "::error::could not create or locate a PR for ${BRANCH}"; exit 1
            fi
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/pulls/${NUM}" \
              -f title="$PR_TITLE" -f body="$(cat "$PR_BODY_PATH")" >/dev/null
            PR_URL="https://github.com/${GITHUB_REPOSITORY}/pull/${NUM}"
            echo "Updated existing PR: ${PR_URL}"
          fi

          if [ "$VERIFIED" = "true" ]; then
            STATUS="✅ automated verification passed — ready for review"
          else
            STATUS="⚠️ automated verification FAILED — do NOT merge as-is (see PR body)"
          fi
          # NB: must not contain the '@coder' trigger token, or this comment re-triggers the workflow.
          gh issue comment "$ISSUE_NUMBER" --body "$(printf '%s\n' \
            "🤖 Coder bot implemented this issue." \
            "" \
            "PR: ${PR_URL}" \
            "Status: ${STATUS}" \
            "Branch: \`${BRANCH}\`" \
            "" \
            "Review the Draft PR before merging.")"
