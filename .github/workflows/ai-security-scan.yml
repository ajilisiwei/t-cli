# AI Security Scan — weekly npm audit + AI triage + auto-fix PR
# Runs every Monday at 6:00 UTC and on manual dispatch.
# If critical vulnerabilities are found, creates a fix PR.

name: AI Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"   # Monday 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: security-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        id: audit
        continue-on-error: true
        run: |
          npm audit --json > audit.json 2>/dev/null || true
          echo "=== audit summary ==="
          python3 -c "
          import json
          with open('audit.json') as f:
              a = json.load(f)
          v = a.get('vulnerabilities', {})
          sevs = {}
          for pkg, info in v.items():
              s = info.get('severity', 'unknown')
              sevs[s] = sevs.get(s, 0) + 1
          print(f'Total: {len(v)}')
          for s in ['critical','high','moderate','low']:
              if s in sevs:
                  print(f'  {s}: {sevs[s]}')
          "

      - name: AI Triage
        id: ai
        uses: ajilisiwei/ai-cicd-action@v1
        with:
          action: security_triage
          llm-provider: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          llm-model: ${{ vars.LLM_MODEL || 'deepseek-chat' }}
          llm-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          audit-file: audit.json

      - name: Print summary
        env:
          SUMMARY: ${{ steps.ai.outputs.summary }}
          HAS_CRITICAL: ${{ steps.ai.outputs.has_critical }}
        run: |
          echo "=== AI Analysis ==="
          echo "$SUMMARY"
          echo ""
          echo "Critical found: $HAS_CRITICAL"

      - name: Apply npm audit fix
        if: steps.ai.outputs.has_critical == 'true'
        run: npm audit fix --package-lock-only 2>&1 || true

      - name: Create Fix PR
        if: steps.ai.outputs.has_critical == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ github.token }}
          title: "fix(deps): auto-fix critical security vulnerabilities"
          body-path: security-fix-body.md
          branch: ai/security-fix
          commit-message: "fix(deps): auto-fix critical security vulnerabilities [AI]"
          delete-branch: true
