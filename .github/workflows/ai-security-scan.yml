# AI Security Scan — weekly npm audit + AI triage + auto-fix PR
# Runs every Monday at 6:00 UTC and on manual dispatch.
# If critical vulnerabilities are found, creates a fix PR.

name: AI Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"   # Monday 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: security-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        id: audit
        continue-on-error: true
        run: |
          npm audit --json > audit.json 2>&1 || true
          echo "=== audit summary ==="
          python3 -c "
          import json
          with open('audit.json') as f:
              a = json.load(f)
          v = a.get('vulnerabilities', {})
          sevs = {}
          for pkg, info in v.items():
              s = info.get('severity', 'unknown')
              sevs[s] = sevs.get(s, 0) + 1
          print(f'Total: {len(v)}')
          for s in ['critical','high','moderate','low']:
              if s in sevs:
                  print(f'  {s}: {sevs[s]}')
          "

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install openai

      - name: AI Triage
        id: ai
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_ACTION: security_triage
        run: python .github/scripts/ai_agent.py

      - name: Print summary
        run: |
          echo "=== AI Analysis ==="
          echo "${{ steps.ai.outputs.summary }}"
          echo ""
          echo "Critical found: ${{ steps.ai.outputs.has_critical }}"

      - name: Apply npm audit fix
        if: steps.ai.outputs.has_critical == 'true'
        run: npm audit fix --package-lock-only 2>&1 || true

      - name: Create Fix PR
        if: steps.ai.outputs.has_critical == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          title: "fix(deps): auto-fix critical security vulnerabilities"
          body-path: security-fix-body.md
          branch: ai/security-fix
          commit-message: "fix(deps): auto-fix critical security vulnerabilities [AI]"
          delete-branch: true
