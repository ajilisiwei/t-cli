name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

# === Cost & Concurrency Safeguards ===
concurrency:
  group: ai-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install openai

      - name: AI Code Review
        id: ai
        env:
          # === Model selection — change these via GitHub Variables ===
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_MODEL:    ${{ vars.LLM_MODEL    || 'deepseek-chat' }}

          # === API Keys ===
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python .github/scripts/ai_agent.py

      - name: Post Review Comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8').trim();
            if (!review || review === 'No diff to review.') {
              console.log('No content to post.');
              return;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: review
            });
